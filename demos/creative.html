<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Creative — Demo</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#fff8f0;--ink:#1a0033;--accent:#ff3366;--accent2:#ffcc00;--accent3:#00d4ff}
  body{background:var(--bg);color:var(--ink);font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;line-height:1.5;overflow-x:hidden}
  .wrap{max-width:1200px;margin:0 auto;padding:1.5rem}
  header{display:flex;justify-content:space-between;align-items:center;padding:1rem 0}
  .brand{font-weight:900;font-size:1.4rem;letter-spacing:-0.04em;text-transform:uppercase}
  .brand span{color:var(--accent)}
  nav a{color:var(--ink);text-decoration:none;margin-left:1.5rem;font-weight:700;font-size:0.9rem;text-transform:uppercase;letter-spacing:0.05em}
  nav a:hover{color:var(--accent)}
  .hero{padding:3rem 0 2rem;position:relative}
  .hero::after{content:"";position:absolute;top:20%;right:-50px;width:200px;height:200px;background:var(--accent2);border-radius:50%;z-index:-1;opacity:0.7}
  .hero::before{content:"";position:absolute;bottom:0;left:30%;width:140px;height:140px;background:var(--accent3);border-radius:50%;z-index:-1;opacity:0.6}
  .hero h1{font-size:clamp(3rem,9vw,7rem);font-weight:900;line-height:0.9;letter-spacing:-0.04em;margin-bottom:1.5rem;text-transform:uppercase}
  .hero h1 .pop{color:var(--accent);display:inline-block;transform:rotate(-3deg)}
  .hero h1 .stroke{-webkit-text-stroke:2px var(--ink);color:transparent}
  .hero p{font-size:1.2rem;max-width:50ch;margin-bottom:2rem;font-weight:500}
  .btn{display:inline-block;padding:1rem 2rem;background:var(--ink);color:#fff;text-decoration:none;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;border-radius:50px;transition:transform 0.2s}
  .btn:hover{transform:scale(1.05) rotate(-2deg);background:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;padding:3rem 0}
  .tile{padding:2rem;border-radius:24px;color:#fff;font-weight:700;min-height:180px;display:flex;flex-direction:column;justify-content:space-between;transform:rotate(-1deg);transition:transform 0.3s}
  .tile:hover{transform:rotate(0) scale(1.03)}
  .tile:nth-child(1){background:var(--accent);transform:rotate(1deg)}
  .tile:nth-child(2){background:var(--ink);transform:rotate(-2deg)}
  .tile:nth-child(3){background:var(--accent3);color:var(--ink);transform:rotate(2deg)}
  .tile .big{font-size:2.5rem;line-height:1;font-weight:900}
  .tile .small{font-size:0.95rem;opacity:0.9}
  footer{padding:2rem 0;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;font-size:0.85rem}
  @media(max-width:640px){.grid{grid-template-columns:1fr}nav a{margin-left:0.75rem;font-size:0.75rem}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Pop<span>!</span>Studio</div>
    <nav>
      <a href="#">Work</a>
      <a href="#">Services</a>
      <a href="#">Hello</a>
    </nav>
  </header>

  <section class="hero">
    <h1>
      Make it <span class="pop">LOUD.</span><br/>
      <span class="stroke">Make it</span> bold.
    </h1>
    <p>Wir gestalten Marken, die nicht zu übersehen sind. Mutig, bunt, unverwechselbar.</p>
    <a class="btn" href="#">Let's talk &rarr;</a>
  </section>

  <section class="grid">
    <div class="tile"><span class="big">120+</span><span class="small">Marken neu erfunden</span></div>
    <div class="tile"><span class="big">14</span><span class="small">Awards seit 2020</span></div>
    <div class="tile"><span class="big">∞</span><span class="small">Ideen pro Woche</span></div>
  </section>

  <footer>&copy; Pop!Studio &mdash; designed loud.</footer>
</div>
</body>
</html>
